<style>

.hi-num { color: #c0392b; font-weight: bold; }

.reg-tbl             { border-collapse: collapse; width: 95%; margin: 0 auto; font-size: 22px; position: relative; top: -20px; }
.reg-tbl th          { padding: 6px 14px; text-align: center; font-weight: normal; }

/* Registration descriptives table */

.priors-slide .priors-cover-b {
  position: absolute;
  top: 14%;

}

  width: 38%;
  font-size: 18px;
  line-height: 1.6;
}

.rr-highlight {
  position: absolute;
  border: 3px solid red;
  z-index: 10;

.eng-tbl thead tr:last-child th { border-bottom: 2px solid #333; }
.eng-tbl td          { padding: 14px 16px; text-align: center; border: none; }
.eng-tbl td:first-child { text-align: left; font-style: italic; }
.eng-tbl tbody tr:last-child td { font-weight: bold; font-style: normal; }

  right: 40px;

}

  text-align: center;
}

  position: absolute;
  width: 35px; height: 55px;

  z-index: 2;
}
.e2p-branch {
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-left: 5px;
}
.e2p-row {
  display: flex;
  align-items: center;
  gap: 8px;

.desc-tbl            { border-collapse: collapse; width: 95%; margin: 0 auto; font-size: 18px; }
.desc-tbl td:first-child { white-space: nowrap; }

.desc-tbl th:first-child { text-align: left; }

.desc-tbl td:first-child { text-align: left; }

  font-weight: bold;
  padding-top: 10px;
  padding-bottom: 2px;
  border-bottom: 1px solid #999;
  text-align: left;
}
.grey      { color: #ccc; }

/* ---------- Sample & standardization flow ---------- */
.samp-sec   { margin: 0.4em 0; font-size: 13px; }
.samp-tag   { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
.samp-flow  { display: flex; align-items: center; gap: 6px; }
.samp-box   {
  padding: 6px 8px;
  border: 1px solid #777;
  text-align: center;
  line-height: 1.2;
  min-height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 auto;
}
.samp-light   { background: #F2F2F2; }
.samp-dark    { background: #333; color: #fff; font-weight: bold; }
.samp-green   { background: #DDEED9; }
.samp-blue    { background: #D9E3F1; }
.samp-excl    { text-align: left; font-size: 11px; min-width: 150px; }
.samp-tiny    { font-size: 11px; min-width: 90px; }
.samp-arrow   { font-size: 22px; color: #555; }
.samp-g0, .samp-g1 {
  border: 1px solid #777;
  padding: 8px;
  background: #FFF;
  font-size: 11px;
  min-width: 140px;
  text-align: center;
}
.samp-g0 { background: #EAF5E6; }
.samp-g1 { background: #EBF1F9; }
.samp-brace {
  display: flex;
  justify-content: space-around;
  font-style: italic;
  color: #555;
  margin-top: 2px;
  font-size: 14px;
}
.samp-brace span:first-child { margin-left: 15%; }
.samp-brace span:last-child  { margin-right: 10%; }
.samp-final {
  margin: 0.6em auto 0 auto;
  width: fit-content;
  padding: 10px 20px;
  background: #333;
  color: #fff;
  font-weight: bold;
  font-size: 16px;
  border-radius: 4px;
}
.samp-on    { opacity: 1; }
.samp-muted { opacity: 0.25; }
.samp-off   { visibility: hidden; }

.consort-row {
  display: block;
  width: 95%;
  margin: 4px auto;
}
.consort-hide { visibility: hidden; }

.otbl td        { padding: 8px 6px; border: 1px solid #bbb; text-align: center; }

/* Fit an image into all available slide space, preserving aspect ratio */
.fit {
  display: block;
  margin: 0 auto;
  width: 100%;
  height: 82vh;      /* slide area minus the h2 title */
  object-fit: contain;
}

/* Progressive reveal on the sampling/encoding diagram.

.samp-slide .samp-cover-bc,
.samp-slide .samp-cover-c {

.wf-slide .wf-cover-cd,
.wf-slide .wf-cover-d {
